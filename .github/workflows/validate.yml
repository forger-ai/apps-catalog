name: Validate Catalog Data

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  generate-catalog-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python3 scripts/generate_catalog.py --out /tmp/catalog.json
