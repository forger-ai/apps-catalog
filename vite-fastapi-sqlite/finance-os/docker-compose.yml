services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/finance_os.sqlite
      CORS_ORIGINS: http://localhost:5180,http://127.0.0.1:5180
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "5180:5180"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5180
    depends_on:
      - backend

volumes:
  frontend_node_modules:
